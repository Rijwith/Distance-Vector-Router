services:
  router_a:
    build: .
    container_name: router_a
    privileged: true
    environment:
      ROUTER_ID: router_a
      MY_IP: 10.0.1.1
      NEIGHBORS: 10.0.1.2,10.0.3.2
    networks:
      net_ab:
        ipv4_address: 10.0.1.1
      net_ac:
        ipv4_address: 10.0.3.1

  router_b:
    build: .
    container_name: router_b
    privileged: true
    environment:
      ROUTER_ID: router_b
      MY_IP: 10.0.1.2
      NEIGHBORS: 10.0.1.1,10.0.2.2
    networks:
      net_ab:
        ipv4_address: 10.0.1.2
      net_bc:
        ipv4_address: 10.0.2.1

  router_c:
    build: .
    container_name: router_c
    privileged: true
    environment:
      ROUTER_ID: router_c
      MY_IP: 10.0.2.2
      NEIGHBORS: 10.0.2.1,10.0.3.1
    networks:
      net_bc:
        ipv4_address: 10.0.2.2
      net_ac:
        ipv4_address: 10.0.3.2

networks:
  net_ab:
    name: net_ab
    external: true
  net_bc:
    name: net_bc
    external: true
  net_ac:
    name: net_ac
    external: true
